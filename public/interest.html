<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookCover — Join the interest list</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&family=Open+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/interest.css" />
  </head>
  <body class="interest-page">
    <div class="interest-wrap">
      <a class="interest-back" href="/">← Back to home</a>

      <div class="interest-card">
        <h1>Join the interest list</h1>
        <p class="sub">
          Tell us a bit about you. We’ll follow up from CercaLabs and keep your details for launch
          updates only.
        </p>

        <form id="bookcover-interest-form" novalidate>
          <div class="interest-field hp-field" aria-hidden="true">
            <label for="company-website">Company website</label>
            <input type="text" id="company-website" name="_companyWebsite" tabindex="-1" autocomplete="off" />
          </div>

          <div class="interest-field">
            <label for="name">Full name <span class="req">*</span></label>
            <input type="text" id="name" name="name" required autocomplete="name" />
          </div>

          <div class="interest-field">
            <label for="email">Work email <span class="req">*</span></label>
            <input type="email" id="email" name="email" required autocomplete="email" />
          </div>

          <div class="interest-field">
            <label for="company">Company / agency / organization</label>
            <input type="text" id="company" name="company" autocomplete="organization" />
          </div>

          <div class="interest-field">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" autocomplete="tel" />
          </div>

          <div class="interest-field">
            <label for="role">I’m interested as</label>
            <select id="role" name="role">
              <option value="">Select one</option>
              <option value="Independent or field agent">Independent or field agent</option>
              <option value="Agency or FMO">Agency or FMO</option>
              <option value="Medicare carrier">Medicare carrier</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="interest-field">
            <label for="message">Anything else we should know?</label>
            <textarea id="message" name="message" placeholder="Optional — book size, timeline, questions…"></textarea>
          </div>

          <button type="submit" class="interest-submit" id="submit-btn">
            <span class="interest-submit-label">Submit</span>
          </button>
        </form>
      </div>
    </div>

    <div
      id="loading-overlay"
      class="interest-loading-overlay"
      hidden
      aria-hidden="true"
      aria-busy="true"
    >
      <div class="interest-loading-inner">
        <div class="interest-spinner" aria-hidden="true"></div>
        <p class="interest-loading-text">Submitting…</p>
      </div>
    </div>

    <div
      id="result-modal"
      class="interest-modal-backdrop"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="result-modal-title"
    >
      <div class="interest-modal">
        <h2 id="result-modal-title" class="interest-modal-title"></h2>
        <p id="result-modal-body" class="interest-modal-body"></p>
        <p id="result-modal-redirect" class="interest-modal-redirect" hidden>
          Redirecting to the home page…
        </p>
        <button type="button" id="result-modal-dismiss" class="interest-modal-dismiss" hidden>
          OK
        </button>
      </div>
    </div>

    <script>
      (function () {
        var form = document.getElementById("bookcover-interest-form");
        var btn = document.getElementById("submit-btn");
        var overlay = document.getElementById("loading-overlay");
        var modal = document.getElementById("result-modal");
        var modalTitle = document.getElementById("result-modal-title");
        var modalBody = document.getElementById("result-modal-body");
        var modalRedirect = document.getElementById("result-modal-redirect");
        var modalDismiss = document.getElementById("result-modal-dismiss");
        var REDIRECT_MS = 2800;

        function showLoading() {
          overlay.hidden = false;
          overlay.setAttribute("aria-hidden", "false");
          document.body.classList.add("interest-no-scroll");
        }

        function hideLoading() {
          overlay.hidden = true;
          overlay.setAttribute("aria-hidden", "true");
          document.body.classList.remove("interest-no-scroll");
        }

        function showResultModal(title, body, isError, doRedirect) {
          modalTitle.textContent = title;
          modalBody.textContent = body;
          modal.classList.toggle("is-error", !!isError);
          if (modalRedirect) {
            modalRedirect.hidden = !doRedirect;
          }
          if (modalDismiss) {
            modalDismiss.hidden = !!doRedirect;
          }
          modal.hidden = false;
          if (doRedirect) {
            setTimeout(function () {
              window.location.href = "/";
            }, REDIRECT_MS);
          }
        }

        if (modalDismiss) {
          modalDismiss.addEventListener("click", function () {
            modal.hidden = true;
          });
        }

        form.addEventListener("submit", async function (e) {
          e.preventDefault();

          var fd = new FormData(form);
          var payload = {
            name: (fd.get("name") || "").trim(),
            email: (fd.get("email") || "").trim(),
            company: (fd.get("company") || "").trim(),
            phone: (fd.get("phone") || "").trim(),
            role: (fd.get("role") || "").trim(),
            message: (fd.get("message") || "").trim(),
            _companyWebsite: (fd.get("_companyWebsite") || "").trim(),
          };

          if (!payload.name || !payload.email) {
            showResultModal(
              "Missing information",
              "Please enter your full name and work email.",
              true,
              false
            );
            return;
          }

          showLoading();
          btn.disabled = true;
          var lockSubmitUntilRedirect = false;

          try {
            var res = await fetch("/api/bookcover-inquiry", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            var data = await res.json().catch(function () {
              return {};
            });
            hideLoading();
            if (!res.ok) {
              showResultModal(
                "Something went wrong",
                data.error || "Submission failed. Please try again or email info@cercalabs.com.",
                true,
                true
              );
              lockSubmitUntilRedirect = true;
              return;
            }
            form.reset();
            showResultModal(
              "Thank you",
              "Your interest is on file. The CercaLabs team will be in touch.",
              false,
              true
            );
            lockSubmitUntilRedirect = true;
          } catch (err) {
            hideLoading();
            showResultModal(
              "Something went wrong",
              err.message || "Submission failed. Please try again.",
              true,
              true
            );
            lockSubmitUntilRedirect = true;
          } finally {
            if (!lockSubmitUntilRedirect) {
              btn.disabled = false;
            }
          }
        });
      })();
    </script>
  </body>
</html>
